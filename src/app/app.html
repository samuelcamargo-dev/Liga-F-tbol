<div style="max-width: 600px; margin: 0 auto; font-family: Arial, sans-serif;">
  
  <h1 style="text-align: center; color: #2c3e50;">⚽ Gestor de Liga Amateur</h1>

  <div style="background: #f4f7f6; padding: 20px; border-radius: 10px; margin-bottom: 20px;">
    <h3>Inscribir Equipo</h3>
    
    <input type="text" [(ngModel)]="newTeamName" placeholder="Nombre del equipo" style="width: 80%; padding: 8px;">
    
    <div style="margin-top: 10px;">
      <input type="text" [(ngModel)]="newPlayerName" placeholder="Nombre del jugador" style="padding: 8px;">
      <button (click)="addPlayerToList()" style="padding: 8px; background: #3498db; color: white; border: none; cursor: pointer;">
        + Añadir
      </button>
    </div>

    <p><i>Jugadores añadidos: {{ tempPlayers.join(', ') }}</i></p>

    <button (click)="saveTeam()" style="width: 100%; padding: 12px; background: #27ae60; color: white; border: none; font-weight: bold; cursor: pointer;">
      GUARDAR EQUIPO EN LA LIGA
    </button>
  </div>

  <div>
    <h3>Equipos en la Liga ({{ teams.length }})</h3>
    
    <div *ngFor="let team of teams" style="border-left: 5px solid #27ae60; background: white; padding: 15px; margin-bottom: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); position: relative;">
      
      <button (click)="deleteTeam(team.id)" style="position: absolute; right: 10px; top: 10px; background: #e74c3c; color: white; border: none; border-radius: 50%; width: 25px; height: 25px; cursor: pointer;">
        X
      </button>

      <h4 style="margin: 0; color: #2c3e50;">{{ team.name }}</h4>
      <p style="margin: 5px 0 0; font-size: 0.9em; color: #7f8c8d;">
        <b>Jugadores:</b> {{ team.players.join(', ') }}
      </p>
    </div>
  </div>

</div>
