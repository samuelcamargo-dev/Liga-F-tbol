<div class="main-container">
  
  <h1 class="title">⚽ Gestor de Liga Amateur</h1>

  <div class="form-card">
    <h3>Inscribir Equipo</h3>
    
    <input type="text" [(ngModel)]="newTeamName" placeholder="Nombre del equipo" class="input-team">
    
    <div class="player-input-row">
      <input type="text" [(ngModel)]="newPlayerName" placeholder="Nombre del jugador" class="input-player">
      <button (click)="addPlayerToList()" class="btn-add">+ Añadir</button>
    </div>

    <p class="preview-text"><i>Jugadores añadidos: {{ tempPlayers.join(', ') }}</i></p>

    <button (click)="saveTeam()" class="btn-save">
      GUARDAR EQUIPO EN LA LIGA
    </button>
  </div>

  <div class="list-container">
    <h3>Equipos en la Liga ({{ teams.length }})</h3>
    
    <div *ngFor="let team of teams" class="team-card">
      
      <button (click)="deleteTeam(team.id)" class="btn-delete">X</button>

      <h4 class="team-name">{{ team.name }}</h4>
      <p class="team-players">
        <b>Jugadores:</b> {{ team.players.join(', ') }}
      </p>
    </div>
  </div>

</div>
